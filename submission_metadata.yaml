methodology_summary: >
  Two-phase hybrid ranking pipeline. Phase A (offline): stream 100k candidates,
  embed with sentence-transformers/static-retrieval-mrl-en-v1 (3200/sec on CPU),
  build BM25 index, extract structured features to parquet. Phase B (rank, <2min):
  dense cosine + BM25 fused via Reciprocal Rank Fusion gives semantic_fit; combined
  with career_quality (product-company ML months + title class), musthave_evidence
  (regex over career descriptions for embeddings/vectorDB/eval-fw/python),
  location_fit, availability_multiplier from 23 redrob signals, and penalties for
  bad titles and consulting-only careers. Honeypot detection via 7 internal
  consistency checks (yoe vs career sum, expert+zero-duration skills, date ordering)
  drives plausibility to ~0. Reasoning is deterministic slot-based, no LLM at rank
  time, with runtime hallucination validation. All weights in config.py.
